name: Install Sprint 1
on:
  push:
    paths:
      - .github/workflows/bootstrap.yml
permissions:
  contents: write
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack verified source
        run: |
          echo '' | base64 -d > /tmp/nextserve.zip
          unzip -o /tmp/nextserve.zip
          rm -f .github/workflows/bootstrap.yml
      - name: Commit Sprint 1
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: implement NextServe Social AI Sprint 1'
          git push
