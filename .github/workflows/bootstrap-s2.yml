name: Install Sprint 2
on: [push]
permissions:
  contents: write
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo '' | base64 -d > /tmp/s2.zip
          unzip -o /tmp/s2.zip
          rm -f .github/workflows/bootstrap-s2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: complete client management Sprint 2'
          git push
