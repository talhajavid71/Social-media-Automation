name: Fix Sprint 3 preview
on: [push]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo '' | base64 -d > /tmp/fix.zip
          unzip -o /tmp/fix.zip
          rm -f .github/workflows/fix-s3.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: handle offline Brand Kit preview'
          git push
