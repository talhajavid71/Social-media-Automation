services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nextserve
      POSTGRES_PASSWORD: nextserve
      POSTGRES_DB: nextserve
    ports:
      - "5432:5432"
    volumes:
      - nextserve_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextserve"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  nextserve_postgres:
